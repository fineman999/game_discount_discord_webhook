<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오늘의 게임 할인</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; padding: 1rem; max-width: 1100px; margin-inline: auto;
         background: #0f1115; color: #e7e9ee; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  .sub { color: #9aa0ab; font-size: .85rem; margin-bottom: 1rem; }
  .controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .75rem; }
  input, select { background: #1a1d24; color: #e7e9ee; border: 1px solid #2a2f3a;
                  border-radius: 8px; padding: .5rem .6rem; font-size: .9rem; }
  input { flex: 1 1 240px; }
  .card { display: grid; grid-template-columns: 56px 1fr auto; gap: .75rem;
          align-items: center; background: #161922; border: 1px solid #232834;
          border-radius: 10px; padding: .6rem .8rem; margin-bottom: .5rem; }
  .card img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; background: #232834; }
  .title { font-weight: 600; }
  .title a { color: #e7e9ee; text-decoration: none; }
  .title a:hover { text-decoration: underline; }
  .meta { color: #9aa0ab; font-size: .82rem; margin-top: .15rem; }
  .right { text-align: right; white-space: nowrap; }
  .cut { display: inline-block; background: #1f6f43; color: #d6ffe6; font-weight: 700;
         border-radius: 6px; padding: .1rem .4rem; font-size: .85rem; }
  .price { font-weight: 700; margin-top: .2rem; }
  .old { color: #7b818d; text-decoration: line-through; font-size: .8rem; margin-left: .35rem; }
  footer { color: #7b818d; font-size: .8rem; margin-top: 1.5rem; text-align: center; }
  footer a { color: #9aa0ab; }
  #status { color: #9aa0ab; padding: 1rem 0; }
</style>
</head>
<body>
<h1>오늘의 게임 할인</h1>
<div class="sub" id="sub">불러오는 중…</div>
<div class="controls">
  <input id="q" type="search" placeholder="게임 이름 검색…" autocomplete="off">
  <select id="sort">
    <option value="pop">인기순</option>
    <option value="cut">할인율 높은순</option>
    <option value="price">가격 낮은순</option>
  </select>
  <select id="shop"><option value="">모든 상점</option></select>
</div>
<div id="status">⏳ 데이터를 불러오는 중…</div>
<div id="list"></div>
<footer>데이터 제공 <a href="https://isthereanydeal.com" rel="noopener">IsThereAnyDeal</a></footer>

<script>
// ── 배포한 Cloudflare Worker URL (worker/README.md 참고) ──
const API_BASE = "https://deal-proxy.chanpark.workers.dev";
const QUERY = "country=KR&shops=steam,epic&max=1500";

let DATA = [];
const list = document.getElementById('list');
const statusEl = document.getElementById('status');
const sub = document.getElementById('sub');
const q = document.getElementById('q');
const sortSel = document.getElementById('sort');
const shopSel = document.getElementById('shop');

const SYM = { KRW: "₩", USD: "$", EUR: "€", GBP: "£", JPY: "¥" };
function fmt(amount, cur) {
  if (amount == null) return "";
  const sym = SYM[cur] || "";
  const body = (cur === "KRW" || cur === "JPY")
    ? Math.round(amount).toLocaleString()
    : Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return sym ? sym + body : body + " " + cur;
}
function esc(s) { const e = document.createElement('div'); e.textContent = s ?? ""; return e.innerHTML; }

function render() {
  const term = q.value.trim().toLowerCase();
  const shop = shopSel.value;
  let rows = DATA.filter(d =>
    (!term || d.title.toLowerCase().includes(term)) && (!shop || d.shop === shop));
  const by = sortSel.value;
  if (by === 'cut') rows.sort((a, b) => b.cut - a.cut);
  else if (by === 'price') rows.sort((a, b) => a.price - b.price);
  // 'pop' 은 Worker 가 준 원래 순서(인기순) 유지

  statusEl.style.display = rows.length ? 'none' : 'block';
  if (!rows.length) statusEl.textContent = '검색 결과가 없어요.';
  list.innerHTML = rows.map(d => `
    <div class="card">
      ${d.thumb ? `<img loading="lazy" src="${esc(d.thumb)}" alt="">` : '<div></div>'}
      <div>
        <div class="title"><a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.title)}</a></div>
        <div class="meta">${esc(d.shop)}${d.low != null ? ' · 역대최저 ' + esc(fmt(d.low, d.currency)) : ''}</div>
      </div>
      <div class="right">
        <span class="cut">-${d.cut}%</span>
        <div class="price">${esc(fmt(d.price, d.currency))}<span class="old">${esc(fmt(d.regular, d.currency))}</span></div>
      </div>
    </div>`).join('');
}

async function load() {
  try {
    const res = await fetch(`${API_BASE}/deals?${QUERY}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const payload = await res.json();
    DATA = payload.deals || [];
    [...new Set(DATA.map(d => d.shop))].sort().forEach(s => {
      const o = document.createElement('option'); o.value = s; o.textContent = s; shopSel.appendChild(o);
    });
    const when = payload.generated_at ? new Date(payload.generated_at).toLocaleString('ko-KR') : '';
    sub.textContent = `할인 ${DATA.length.toLocaleString()}개 · ${when} 기준 (인기순)`;
    render();
  } catch (e) {
    sub.textContent = '';
    statusEl.innerHTML = `⚠️ 데이터를 불러오지 못했어요. (${esc(e.message)})<br>` +
      `<small>index.html 의 <code>API_BASE</code> 가 배포한 Worker URL 인지 확인하세요.</small>`;
  }
}

q.addEventListener('input', render);
sortSel.addEventListener('change', render);
shopSel.addEventListener('change', render);
load();
</script>
</body>
</html>
