<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 게임 할인</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg-color: #0b0b0f;
    --card-bg: #16171d;
    --card-bg2: #1d1f27;
    --text-primary: #ffffff;
    --text-secondary: #8a8f9a;
    --accent-green: #4ade80;
    --accent-blue: #3b82f6;
    --line: #262932;
  }
  * { margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, -apple-system, Helvetica, Arial, sans-serif; }
  body { background: var(--bg-color); color: var(--text-primary); display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 480px; min-height: 100vh; padding: 20px 16px 40px; }

  .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .update-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 18px; }

  .platform-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; background: #23252e; border: none; color: #cfd3db; padding: 10px;
         border-radius: 10px; font-size: 14px; cursor: pointer; display: flex; gap: 6px;
         align-items: center; justify-content: center; transition: background .15s; }
  .tab:hover { background: #2c2f3a; }
  .tab.active { background: var(--accent-blue); color: #fff; font-weight: 700; }

  .search-filter-container { display: flex; gap: 10px; margin-bottom: 22px; }
  .search-bar { flex: 2; background: var(--card-bg); border-radius: 10px; padding: 12px;
                display: flex; align-items: center; gap: 10px; }
  .search-bar i { color: var(--text-secondary); }
  .search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px; }
  .sort-dropdown { flex: 1; background: var(--card-bg); border-radius: 10px; padding: 8px 10px;
                   font-size: 11px; color: var(--text-secondary); }
  .sort-dropdown select { background: transparent; color: var(--accent-blue); border: none;
                          width: 100%; font-weight: 700; outline: none; font-size: 13px; }

  .featured-section { margin-bottom: 24px; }
  .featured-section h2, .list-head h2 { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .featured-section h2 i { color: var(--accent-green); }
  .featured-carousel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
  .featured-card { position: relative; min-width: 130px; width: 130px; border-radius: 12px;
                   overflow: hidden; background: var(--card-bg2); cursor: pointer; }
  .featured-card img { width: 100%; height: 175px; object-fit: cover; display: block; }
  .featured-card .cap { padding: 8px; }
  .featured-card .cap .name { font-size: 12px; font-weight: 600; white-space: nowrap;
                              overflow: hidden; text-overflow: ellipsis; }
  .featured-card .badge { position: absolute; top: 8px; left: 8px; background: var(--accent-green);
                          color: #04130a; padding: 3px 7px; border-radius: 6px; font-weight: 800; font-size: 12px; }

  .list-head { display: flex; justify-content: space-between; align-items: baseline; }
  .list-head .count { color: var(--text-secondary); font-size: 13px; }

  .game-item { background: var(--card-bg); border-radius: 16px; padding: 12px; display: flex;
               gap: 14px; margin-bottom: 12px; }
  .game-thumb img { width: 120px; height: 68px; border-radius: 8px; object-fit: cover; background: var(--card-bg2); }
  .game-info { flex: 1; min-width: 0; }
  .game-info h3 { font-size: 15px; margin-bottom: 8px; }
  .offer-row { display: flex; align-items: center; gap: 8px; text-decoration: none;
               color: inherit; padding: 4px 0; flex-wrap: wrap; }
  .offer-row + .offer-row { border-top: 1px dashed var(--line); }
  .platform-info { font-size: 12px; color: var(--text-secondary); display: inline-flex; gap: 5px;
                   align-items: center; min-width: 96px; }
  .platform-info .fa-steam { color: #c7d5e0; }
  .platform-info .fa-ghost { color: #cdb4ff; }
  .discount-badge { background: var(--accent-green); color: #04130a; padding: 2px 6px;
                    border-radius: 5px; font-weight: 800; font-size: 13px; }
  .current-price { font-weight: 700; font-size: 14px; }
  .original-price { color: var(--text-secondary); text-decoration: line-through; font-size: 12px; }
  .both-tag { font-size: 10px; color: var(--accent-green); border: 1px solid var(--accent-green);
              border-radius: 4px; padding: 1px 4px; margin-left: auto; }

  .status { color: var(--text-secondary); padding: 24px 0; text-align: center; }
  footer { color: #6b7079; font-size: 12px; margin-top: 24px; text-align: center; }
  footer a { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="app-container">
  <header class="header">
    <h1>오늘의 게임 할인</h1>
    <p class="update-time" id="update-time">불러오는 중…</p>
  </header>

  <nav class="platform-tabs" id="tabs">
    <button class="tab active" data-tab="all">전체</button>
    <button class="tab" data-tab="steam"><i class="fab fa-steam"></i> Steam</button>
    <button class="tab" data-tab="epic"><i class="fas fa-ghost"></i> Epic</button>
    <button class="tab" data-tab="watch"><i class="fas fa-heart"></i> 찜</button>
  </nav>

  <div class="search-filter-container">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input id="q" type="search" placeholder="게임 이름 검색…" autocomplete="off">
    </div>
    <div class="sort-dropdown">
      <span>정렬</span>
      <select id="sort">
        <option value="pop">인기순</option>
        <option value="cut">할인율순</option>
        <option value="price">가격 낮은순</option>
      </select>
    </div>
  </div>

  <section class="featured-section" id="featured-section">
    <h2><i class="fas fa-fire"></i> Biggest Steals</h2>
    <div class="featured-carousel" id="featured"></div>
  </section>

  <div class="list-head">
    <h2>할인 목록</h2>
    <span class="count" id="count"></span>
  </div>
  <main id="list"></main>
  <div class="status" id="status">⏳ 불러오는 중…</div>

  <footer>데이터 제공 <a href="https://isthereanydeal.com" rel="noopener">IsThereAnyDeal</a></footer>
</div>

<script>
// ── 배포한 Cloudflare Worker URL (worker/README.md 참고) ──
const API_BASE = "https://deal-proxy.chanpark.workers.dev";
const COUNTRY = "KR";
const PER_SHOP_MAX = 800;   // 상점별(Steam/Epic) 탭용
const COMBINED_MAX = 800;   // 전체 탭 인기순 순서용 (통합 조회)

const store = {};
let activeTab = "all";
const q = document.getElementById('q');
const sortSel = document.getElementById('sort');
const listEl = document.getElementById('list');
const featEl = document.getElementById('featured');
const featSection = document.getElementById('featured-section');
const statusEl = document.getElementById('status');
const countEl = document.getElementById('count');
const updateEl = document.getElementById('update-time');

const SYM = { KRW: "₩", USD: "$", EUR: "€", GBP: "£", JPY: "¥" };
function fmt(amount, cur) {
  if (amount == null) return "";
  const sym = SYM[cur] || "";
  const body = (cur === "KRW" || cur === "JPY")
    ? Math.round(amount).toLocaleString()
    : Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return sym ? sym + body : body + " " + cur;
}
function esc(s) { const e = document.createElement('div'); e.textContent = s ?? ""; return e.innerHTML; }
function shopIcon(name) {
  const n = (name || "").toLowerCase();
  if (n.includes('steam')) return '<i class="fab fa-steam"></i>';
  if (n.includes('epic')) return '<i class="fas fa-ghost"></i>';
  return '<i class="fas fa-store"></i>';
}

function indexById(rows) {
  const m = new Map();
  for (const r of rows || []) if (!m.has(r.id)) m.set(r.id, r);
  return m;
}

// 행 배열을 게임 UUID 로 묶는다 (같은 게임의 여러 상점 가격을 한 그룹으로).
function groupRows(rows) {
  const m = new Map(), order = [];
  for (const r of rows || []) {
    let g = m.get(r.id);
    if (!g) { g = { id: r.id, title: r.title, thumb: r.thumb, banner: r.banner, offers: [] }; m.set(r.id, g); order.push(g); }
    g.offers.push(r);
    if (!g.thumb) g.thumb = r.thumb;
    if (!g.banner) g.banner = r.banner;
  }
  return order;
}

// 현재 탭의 게임 그룹 목록.
// all: 통합 인기순(store._all)으로 순서를 잡고, Steam·Epic 목록에서 같은 게임의 가격을 교차 병합.
// (ITAD deals/v2 는 통합 조회 시 게임당 1개만 주므로, 양쪽 가격은 상점별 목록에서 채운다)
function groupsForTab(tab) {
  if (tab === 'all') {
    const steamById = indexById(store.steam);
    const epicById = indexById(store.epic);
    const groups = [], seen = new Set();
    for (const r of store._all || []) {
      if (seen.has(r.id)) continue;
      seen.add(r.id);
      const offers = [];
      if (steamById.has(r.id)) offers.push(steamById.get(r.id));
      if (epicById.has(r.id)) offers.push(epicById.get(r.id));
      if (!offers.length) offers.push(r); // 상점별 목록 범위를 벗어난 경우 통합 결과로 폴백
      groups.push({
        id: r.id, title: r.title,
        thumb: r.thumb || offers[0].thumb, banner: r.banner || offers[0].banner,
        offers,
      });
    }
    return groups;
  }
  if (tab === 'watch') return groupRows(store._watch);
  return (store[tab] || []).map(r => ({ id: r.id, title: r.title, thumb: r.thumb, banner: r.banner, offers: [r] }));
}

function offerRow(o) {
  return `
    <a class="offer-row" href="${esc(o.url)}" target="_blank" rel="noopener">
      <span class="platform-info">${shopIcon(o.shop)} ${esc(o.shop)}</span>
      <span class="discount-badge">-${o.cut}%</span>
      <span class="current-price">${esc(fmt(o.price, o.currency))}</span>
      <span class="original-price">${esc(fmt(o.regular, o.currency))}</span>
    </a>`;
}

function gameCard(g) {
  const offers = [...g.offers].sort((a, b) => b.cut - a.cut);
  const both = offers.length > 1 ? '<span class="both-tag">Steam+Epic</span>' : '';
  return `
    <div class="game-item">
      <div class="game-thumb"><img loading="lazy" src="${esc(g.banner || g.thumb)}" alt=""></div>
      <div class="game-info">
        <h3 style="display:flex;align-items:center">${esc(g.title)}${both}</h3>
        ${offers.map(offerRow).join('')}
      </div>
    </div>`;
}

function featuredCard(g) {
  const best = g.offers.reduce((a, b) => (b.cut > a.cut ? b : a));
  return `
    <div class="featured-card" onclick="window.open('${esc(best.url)}','_blank')">
      <span class="badge">-${best.cut}%</span>
      <img loading="lazy" src="${esc(g.thumb || g.banner)}" alt="">
      <div class="cap"><div class="name">${esc(g.title)}</div></div>
    </div>`;
}

function render() {
  const term = q.value.trim().toLowerCase();
  let groups = groupsForTab(activeTab);
  groups.forEach(g => {
    g.bestCut = Math.max(...g.offers.map(o => o.cut));
    g.minPrice = Math.min(...g.offers.map(o => o.price));
  });

  // Featured: 탭 전체에서 할인율 최고 10개 (검색과 무관하게 고정)
  const featured = [...groups].sort((a, b) => b.bestCut - a.bestCut).slice(0, 10);
  featEl.innerHTML = featured.map(featuredCard).join('');
  featSection.style.display = featured.length ? 'block' : 'none';

  if (term) groups = groups.filter(g => g.title.toLowerCase().includes(term));
  const by = sortSel.value;
  if (by === 'cut') groups.sort((a, b) => b.bestCut - a.bestCut);
  else if (by === 'price') groups.sort((a, b) => a.minPrice - b.minPrice);
  // 'pop' 은 groupsForTab 의 인기순 유지

  countEl.textContent = `${groups.length.toLocaleString()}개`;
  listEl.innerHTML = groups.map(gameCard).join('');
  statusEl.style.display = groups.length ? 'none' : 'block';
  if (!groups.length) {
    if (term) statusEl.textContent = '검색 결과가 없어요.';
    else if (activeTab === 'watch') statusEl.textContent = '찜한 게임 중 현재 할인 중인 게임이 없어요. (config.yaml 의 watchlist 설정)';
    else statusEl.textContent = '불러오는 중…';
  }
}

async function loadFeed(key, shopsParam, max) {
  try {
    const res = await fetch(`${API_BASE}/deals?country=${COUNTRY}&shops=${shopsParam}&max=${max}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const p = await res.json();
    store[key] = p.deals || [];
    if (p.generated_at) {
      updateEl.textContent = `최종 업데이트: ${new Date(p.generated_at).toLocaleString('ko-KR')} · 인기순`;
    }
  } catch (e) {
    store[key] = [];
    statusEl.textContent = `⚠️ 불러오기 실패 (${e.message}) — index.html 의 API_BASE 확인`;
  }
  render();
}

// "찜" 탭: 봇이 만든 정적 파일(watchlist.json)을 읽는다 (Worker 아님, 같은 오리진).
async function loadWatchlist() {
  try {
    const res = await fetch('watchlist.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const p = await res.json();
    store._watch = p.deals || [];
  } catch {
    store._watch = []; // 파일 없거나 비어있으면 빈 찜 목록
  }
  render();
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  render();
});
q.addEventListener('input', render);
sortSel.addEventListener('change', render);
loadFeed('steam', 'steam', PER_SHOP_MAX);
loadFeed('epic', 'epic', PER_SHOP_MAX);
loadFeed('_all', 'steam,epic', COMBINED_MAX);  // 전체 탭 인기순 순서
loadWatchlist();                               // 찜 탭
</script>
</body>
</html>
