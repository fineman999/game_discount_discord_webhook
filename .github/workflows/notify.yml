name: deal-notify

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 09:00 KST (cron은 UTC 기준)
  workflow_dispatch:        # 수동 트리거/테스트용

permissions:
  contents: write           # state.json commit back

concurrency:
  group: deal-notify        # 중복 실행 방지
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e . --no-deps

      - name: Run dealbot
        run: python -m dealbot
        env:
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
